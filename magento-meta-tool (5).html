<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titanium Strength — Meta SEO Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --panel: #181818;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff6b00;
    --text: #f0f0f0;
    --muted: #888;
    --success: #00e676;
    --error: #ff4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--dark);
    border-bottom: 2px solid var(--accent);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  header span {
    color: var(--muted);
    font-size: 13px;
    font-weight: 300;
  }

  .badge {
    margin-left: auto;
    background: var(--accent);
    color: var(--black);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
  }

  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-weight: 500;
  }

  .field input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
  }

  .btn {
    background: var(--accent);
    color: var(--black);
    border: none;
    padding: 14px 32px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover { background: #d4e800; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-secondary:hover { background: var(--accent); color: var(--black); }
  .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--error);
    color: var(--error);
    padding: 8px 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-danger:hover { background: var(--error); color: white; }

  .log-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--muted);
    max-height: 150px;
    overflow-y: auto;
    margin-bottom: 32px;
    display: none;
  }

  .log-box.visible { display: block; }
  .log-line { padding: 2px 0; }
  .log-line.ok { color: var(--success); }
  .log-line.err { color: var(--error); }
  .log-line.info { color: var(--accent); }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .product-count {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0;
  }

  .product-card {
    background: var(--panel);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .product-card:hover { border-color: #444; }
  .product-card.done { border-left: 3px solid var(--success); }
  .product-card.error { border-left: 3px solid var(--error); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }

  .card-header:hover { background: #1e1e1e; }

  .product-name {
    font-weight: 600;
    font-size: 15px;
    flex: 1;
  }

  .sku {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
  }

  .template-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .t1 { background: #1a2a00; color: #a8ff00; border: 1px solid #4a7000; }
  .t2 { background: #001a2a; color: #00b8ff; border: 1px solid #004a7a; }
  .t3 { background: #2a1a00; color: #ffaa00; border: 1px solid #7a4a00; }
  .t4 { background: #2a001a; color: #ff6b9d; border: 1px solid #7a0040; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .status-dot.done { background: var(--success); }
  .status-dot.error { background: var(--error); }
  .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .card-body {
    padding: 0 20px 20px;
    display: none;
    border-top: 1px solid var(--border);
  }

  .card-body.open { display: block; }

  .template-select {
    display: flex;
    gap: 8px;
    margin: 16px 0;
    flex-wrap: wrap;
  }

  .tpl-btn {
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    border: 1px solid transparent;
  }

  .tpl-btn.active-t1 { background: #1a2a00; color: #a8ff00; border-color: #a8ff00; }
  .tpl-btn.active-t2 { background: #001a2a; color: #00b8ff; border-color: #00b8ff; }
  .tpl-btn.active-t3 { background: #2a1a00; color: #ffaa00; border-color: #ffaa00; }
  .tpl-btn.active-t4 { background: #2a001a; color: #ff6b9d; border-color: #ff6b9d; }
  .tpl-btn:not([class*="active"]) { background: var(--dark); color: var(--muted); border-color: var(--border); }
  .tpl-btn:hover:not([class*="active"]) { border-color: #555; color: var(--text); }

  .meta-fields { display: flex; flex-direction: column; gap: 12px; }

  .meta-field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .char-count {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    background: var(--dark);
  }

  .char-count.ok { color: var(--success); }
  .char-count.warn { color: var(--accent2); }
  .char-count.over { color: var(--error); }

  .meta-field input,
  .meta-field textarea {
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .meta-field textarea { min-height: 70px; }

  .meta-field input:focus,
  .meta-field textarea:focus { border-color: var(--accent); }

  .card-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    align-items: center;
  }

  .save-status {
    font-size: 12px;
    color: var(--muted);
  }

  .save-status.saved { color: var(--success); }
  .save-status.err { color: var(--error); }

  .bulk-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .bulk-bar span { font-size: 13px; color: var(--muted); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    margin-bottom: 32px;
    display: none;
  }

  .progress-bar.visible { display: block; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    width: 0%;
  }

  .empty-state {
    text-align: center;
    padding: 80px 40px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: var(--border); margin-bottom: 8px; }

  .chevron {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    margin-left: auto;
  }
  .chevron.open { transform: rotate(180deg); }

  .existing-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <h1>⚡ Titanium Strength</h1>
  <span>META SEO TOOL</span>
  <div class="badge" id="connStatus">Niet verbonden</div>
</header>

<main>
  <!-- Config -->
  <div class="config-grid">
    <div class="field">
      <label>Store URL</label>
      <input type="text" id="storeUrl" value="https://test.gymcompany.nl" placeholder="https://jouwshop.nl">
    </div>
    <div class="field">
      <label>Access Token</label>
      <input type="password" id="apiToken" value="uig1ojhdhfwcggfykm8pgat7rt78i034" placeholder="Bearer token">
    </div>
    <div class="field" style="grid-column: 1/-1;">
      <label>Categorie URL-pad (of naam)</label>
      <input type="text" id="categoryInput" value="machines-met-schijven" placeholder="bijv. machines-met-schijven of category ID">
    </div>
  </div>

  <button class="btn" id="loadBtn" onclick="loadProducts()">
    ▶ PRODUCTEN LADEN
  </button>

  <!-- Log -->
  <div class="log-box" id="logBox"></div>

  <!-- Progress -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Bulk actions -->
  <div class="bulk-bar" id="bulkBar" style="display:none;">
    <span id="productCountLabel">0 producten geladen</span>
    <button class="btn-secondary" onclick="generateAll()" id="generateAllBtn">⚡ GENEREER ALLE META TEKSTEN</button>
    <button class="btn" onclick="saveAll()" id="saveAllBtn" style="margin-left:auto;">💾 ALLES OPSLAAN IN MAGENTO</button>
  </div>

  <!-- Products -->
  <div id="productList">
    <div class="empty-state">
      <div class="icon">🏋️</div>
      <h3>Nog geen producten geladen</h3>
      <p>Klik op "Producten laden" om te beginnen</p>
    </div>
  </div>
</main>

<script>
const TEMPLATES = {
  1: {
    name: "Focus op Prestaties",
    desc: "High-end machines — autoriteit & biomechanica",
    color: "t1",
    titleTpl: "[Productnaam] Kopen? | [Belangrijkste Voordeel] | Titanium Strength",
    descTpl: "Maximaliseer je training met de [Productnaam]. Ontworpen voor [doelgroep] die gaan voor [voordeel]. Belastbaar tot [gewicht] kg. Bekijk hem nu!",
    prompt: "Schrijf een meta titel en meta description in het Nederlands voor een fitnessproduct. Straal autoriteit uit, focus op biomechanica en resultaat. Stijl: professioneel, voor serieuze sporters en powerlifters."
  },
  2: {
    name: "Slimme Oplossing",
    desc: "2-in-1 machines — efficiëntie & ruimtebesparing",
    color: "t2",
    titleTpl: "[Productnaam] | 2-in-1 [Oefening 1] & [Oefening 2] Machine",
    descTpl: "Bespaar ruimte zonder in te leveren op kwaliteit. De [Productnaam] combineert [Oefening 1] en [Oefening 2] in één compact station. Ideaal voor PT-studio's en home gyms. Shop hier!",
    prompt: "Schrijf een meta titel en meta description in het Nederlands voor een 2-in-1 fitnessmachine. Focus op efficiëntie, ruimtebesparing en veelzijdigheid. Ideaal voor home gyms en PT-studio's."
  },
  3: {
    name: "Commerciële Kwaliteit",
    desc: "Zware plate-loaded — duurzaamheid & commercial",
    color: "t3",
    titleTpl: "Professionele [Productnaam] | Plate-Loaded | Titanium Strength",
    descTpl: "Zoek je een onverwoestbare [Productnaam]? Deze schijfbelastbare machine is gebouwd van [dikte] mm staal en belastbaar tot [gewicht] kg. Perfect voor commercieel gebruik.",
    prompt: "Schrijf een meta titel en meta description in het Nederlands voor een commerciële plate-loaded fitnessmachine. Gebruik termen als 'Heavy Duty', 'Semi-Professioneel' en 'Robuust'. Benadruk duurzaamheid en capaciteit."
  },
  4: {
    name: "Conversie-Knaller",
    desc: "Kort & krachtig — directe CTA",
    color: "t4",
    titleTpl: "[Productnaam] Bestellen | Direct Leverbaar | Titanium Strength",
    descTpl: "Upgrade je workout met de [Productnaam] van Titanium Strength. 2-in-1 functionaliteit, [gewicht] kg draagkracht en geschikt voor 50mm schijven. Bestel vandaag nog bij de specialist!",
    prompt: "Schrijf een meta titel en meta description in het Nederlands voor een fitnessmachine. Schrijf kort en krachtig. Gebruik een duidelijke Call-to-Action. Vermeld directe levering en de merknaam Titanium Strength."
  }
};

let products = [];
let assignments = {};

function log(msg, type='info') {
  const box = document.getElementById('logBox');
  box.classList.add('visible');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function buildUrl(path) {
  const url = document.getElementById('storeUrl').value.replace(/\/$/, '');
  const base = url.replace('https://', '').replace('http://', '');
  return 'https://gymco:gymco@' + base + '/rest/V1/' + path;
}

async function magentoGet(path) {
  const token = document.getElementById('apiToken').value;
  const r = await fetch(buildUrl(path), {
    mode: 'cors',
    credentials: 'include',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    }
  });
  if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + await r.text());
  return r.json();
}
  });
  if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + await r.text());
  return r.json();
}

async function magentoPut(path, body) {
  const token = document.getElementById('apiToken').value;
  const r = await fetch(buildUrl(path), {
    method: 'PUT',
    mode: 'cors',
    credentials: 'include',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + await r.text());
  return r.json();
},
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + await r.text());
  return r.json();
}

async function loadProducts() {
  const btn = document.getElementById('loadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ LADEN...';
  document.getElementById('logBox').innerHTML = '';

  try {
    const categoryInput = document.getElementById('categoryInput').value.trim();
    log(`Categorie zoeken: "${categoryInput}"...`);

    // Find category by url_key or id
    let categoryId;
    if (/^\d+$/.test(categoryInput)) {
      categoryId = parseInt(categoryInput);
    } else {
      const cats = await magentoGet(`categories/list?searchCriteria[filter_groups][0][filters][0][field]=url_key&searchCriteria[filter_groups][0][filters][0][value]=${encodeURIComponent(categoryInput)}&searchCriteria[filter_groups][0][filters][0][condition_type]=eq`);
      if (!cats.items || cats.items.length === 0) {
        // Try by name
        const cats2 = await magentoGet(`categories/list?searchCriteria[filter_groups][0][filters][0][field]=name&searchCriteria[filter_groups][0][filters][0][value]=${encodeURIComponent(categoryInput)}&searchCriteria[filter_groups][0][filters][0][condition_type]=like`);
        if (!cats2.items || cats2.items.length === 0) throw new Error('Categorie niet gevonden. Controleer de naam of URL-sleutel.');
        categoryId = cats2.items[0].id;
        log(`Categorie gevonden via naam: "${cats2.items[0].name}" (ID: ${categoryId})`, 'ok');
      } else {
        categoryId = cats.items[0].id;
        log(`Categorie gevonden: "${cats.items[0].name}" (ID: ${categoryId})`, 'ok');
      }
    }

    log(`Producten ophalen uit categorie ${categoryId}...`);
    const data = await magentoGet(`products?searchCriteria[filter_groups][0][filters][0][field]=category_id&searchCriteria[filter_groups][0][filters][0][value]=${categoryId}&searchCriteria[filter_groups][0][filters][0][condition_type]=eq&searchCriteria[pageSize]=200`);

    products = data.items || [];
    log(`${products.length} producten gevonden`, products.length > 0 ? 'ok' : 'err');

    if (products.length === 0) throw new Error('Geen producten gevonden in deze categorie.');

    // Auto-assign templates
    autoAssignTemplates();
    renderProducts();

    document.getElementById('connStatus').textContent = `${products.length} producten`;
    document.getElementById('connStatus').style.background = 'var(--success)';
    document.getElementById('bulkBar').style.display = 'flex';
    document.getElementById('productCountLabel').textContent = `${products.length} producten geladen`;

  } catch(e) {
    log(`Fout: ${e.message} | Stack: ${e.stack}`, 'err');
    document.getElementById('connStatus').textContent = 'Fout';
    document.getElementById('connStatus').style.background = 'var(--error)';
  }

  btn.disabled = false;
  btn.textContent = '↺ OPNIEUW LADEN';
}

function autoAssignTemplates() {
  // Smart auto-assignment based on product name keywords
  products.forEach(p => {
    const name = (p.name || '').toLowerCase();
    let tpl = 4; // default

    if (name.includes('2-in-1') || name.includes('combi') || name.includes('lxc') || name.includes('ulxc')) {
      tpl = 2;
    } else if (name.includes('reverse hyper') || name.includes('unilateral') || name.includes('isolat') || name.includes('extension')) {
      tpl = 1;
    } else if (name.includes('commerci') || name.includes('professioneel') || name.includes('500') || name.includes('heavy')) {
      tpl = 3;
    }

    assignments[p.sku] = {
      template: tpl,
      meta_title: getAttrValue(p, 'meta_title') || '',
      meta_description: getAttrValue(p, 'meta_description') || '',
      generated: false,
      saved: false
    };
  });
}

function getAttrValue(product, code) {
  const attr = (product.custom_attributes || []).find(a => a.attribute_code === code);
  return attr ? attr.value : '';
}

function renderProducts() {
  const container = document.getElementById('productList');
  container.innerHTML = '';

  const title = document.createElement('div');
  title.className = 'section-title';
  title.innerHTML = `PRODUCTEN <span class="product-count">${products.length} items — verdeel templates en genereer meta teksten</span>`;
  container.appendChild(title);

  products.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.id = `card-${p.sku}`;

    const a = assignments[p.sku];
    const tpl = TEMPLATES[a.template];

    card.innerHTML = `
      <div class="card-header" onclick="toggleCard('${p.sku}')">
        <div class="status-dot" id="dot-${p.sku}"></div>
        <div>
          <div class="product-name">${p.name}</div>
          <div class="sku">SKU: ${p.sku}</div>
        </div>
        <span class="template-badge ${tpl.color}">T${a.template} — ${tpl.name}</span>
        <span class="chevron" id="chev-${p.sku}">▼</span>
      </div>
      <div class="card-body" id="body-${p.sku}">
        <div class="template-select">
          <span style="font-size:11px;color:var(--muted);align-self:center;margin-right:4px;">TEMPLATE:</span>
          ${[1,2,3,4].map(t => `<button class="tpl-btn ${a.template===t?'active-t'+t:''}" onclick="setTemplate('${p.sku}',${t})" id="tplbtn-${p.sku}-${t}">T${t} — ${TEMPLATES[t].name}</button>`).join('')}
        </div>
        <div class="meta-fields">
          <div class="meta-field">
            <label>
              META TITEL
              <span class="char-count" id="tc-${p.sku}">0</span>
            </label>
            <input type="text" id="title-${p.sku}" value="${escHtml(a.meta_title)}"
              oninput="updateCharCount('${p.sku}')"
              placeholder="Wordt gegenereerd na klikken op Genereren...">
            <div class="existing-meta" id="orig-title-${p.sku}"></div>
          </div>
          <div class="meta-field">
            <label>
              META DESCRIPTION
              <span class="char-count" id="dc-${p.sku}">0</span>
            </label>
            <textarea id="desc-${p.sku}" oninput="updateCharCount('${p.sku}')"
              placeholder="Wordt gegenereerd na klikken op Genereren...">${escHtml(a.meta_description)}</textarea>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-secondary" onclick="generateOne('${p.sku}')" id="gen-${p.sku}">⚡ GENEREREN</button>
          <button class="btn" onclick="saveOne('${p.sku}')" id="save-${p.sku}">💾 OPSLAAN</button>
          <span class="save-status" id="status-${p.sku}"></span>
        </div>
      </div>
    `;
    container.appendChild(card);
    updateCharCount(p.sku);
  });
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleCard(sku) {
  const body = document.getElementById(`body-${sku}`);
  const chev = document.getElementById(`chev-${sku}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function setTemplate(sku, t) {
  assignments[sku].template = t;
  // Update badge
  const card = document.getElementById(`card-${sku}`);
  const badge = card.querySelector('.template-badge');
  badge.className = `template-badge ${TEMPLATES[t].color}`;
  badge.textContent = `T${t} — ${TEMPLATES[t].name}`;
  // Update buttons
  [1,2,3,4].forEach(i => {
    const btn = document.getElementById(`tplbtn-${sku}-${i}`);
    btn.className = `tpl-btn ${i===t?'active-t'+i:''}`;
  });
}

function updateCharCount(sku) {
  const title = document.getElementById(`title-${sku}`).value;
  const desc = document.getElementById(`desc-${sku}`).value;

  const tc = document.getElementById(`tc-${sku}`);
  const dc = document.getElementById(`dc-${sku}`);

  tc.textContent = `${title.length} tekens`;
  tc.className = `char-count ${title.length <= 60 ? 'ok' : title.length <= 70 ? 'warn' : 'over'}`;

  dc.textContent = `${desc.length} tekens`;
  dc.className = `char-count ${desc.length <= 155 ? 'ok' : desc.length <= 165 ? 'warn' : 'over'}`;
}

async function generateOne(sku) {
  const product = products.find(p => p.sku === sku);
  const a = assignments[sku];
  const tpl = TEMPLATES[a.template];
  const btn = document.getElementById(`gen-${sku}`);
  const dot = document.getElementById(`dot-${sku}`);

  btn.disabled = true;
  btn.textContent = '⏳ GENEREREN...';
  dot.className = 'status-dot loading';

  const description = getAttrValue(product, 'description') || getAttrValue(product, 'short_description') || '';

  const prompt = `${tpl.prompt}

Product naam: ${product.name}
SKU: ${product.sku}
${description ? `Productbeschrijving: ${description.replace(/<[^>]*>/g, '').substring(0, 300)}` : ''}

Geef ALLEEN een JSON object terug (geen uitleg, geen markdown):
{
  "meta_title": "...",
  "meta_description": "..."
}

Regels:
- Meta titel: maximaal 60 tekens, eindig ALTIJD op "| Titanium Strength"
- Meta description: maximaal 155 tekens, eindig met een CTA
- Schrijf in het Nederlands
- Gebruik de echte productnaam: "${product.name}"`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById(`title-${sku}`).value = parsed.meta_title || '';
    document.getElementById(`desc-${sku}`).value = parsed.meta_description || '';
    assignments[sku].meta_title = parsed.meta_title || '';
    assignments[sku].meta_description = parsed.meta_description || '';
    assignments[sku].generated = true;

    updateCharCount(sku);
    dot.className = 'status-dot';
    document.getElementById(`status-${sku}`).textContent = '✓ Gegenereerd';
    document.getElementById(`status-${sku}`).className = 'save-status saved';

  } catch(e) {
    dot.className = 'status-dot error';
    document.getElementById(`status-${sku}`).textContent = `Fout: ${e.message}`;
    document.getElementById(`status-${sku}`).className = 'save-status err';
  }

  btn.disabled = false;
  btn.textContent = '↺ OPNIEUW';
}

async function saveOne(sku) {
  const product = products.find(p => p.sku === sku);
  const btn = document.getElementById(`save-${sku}`);
  const dot = document.getElementById(`dot-${sku}`);
  const statusEl = document.getElementById(`status-${sku}`);

  const title = document.getElementById(`title-${sku}`).value;
  const desc = document.getElementById(`desc-${sku}`).value;

  if (!title && !desc) {
    statusEl.textContent = 'Genereer eerst meta teksten!';
    statusEl.className = 'save-status err';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ OPSLAAN...';
  dot.className = 'status-dot loading';

  try {
    const customAttrs = [...(product.custom_attributes || [])];
    const setAttr = (code, value) => {
      const idx = customAttrs.findIndex(a => a.attribute_code === code);
      if (idx >= 0) customAttrs[idx] = { attribute_code: code, value };
      else customAttrs.push({ attribute_code: code, value });
    };
    setAttr('meta_title', title);
    setAttr('meta_description', desc);

    await magentoPut(`products/${encodeURIComponent(sku)}`, {
      product: { sku, custom_attributes: customAttrs }
    });

    assignments[sku].saved = true;
    dot.className = 'status-dot done';
    document.getElementById(`card-${sku}`).className = 'product-card done';
    statusEl.textContent = '✓ Opgeslagen in Magento';
    statusEl.className = 'save-status saved';
    log(`✓ ${product.name} opgeslagen`, 'ok');

  } catch(e) {
    dot.className = 'status-dot error';
    document.getElementById(`card-${sku}`).className = 'product-card error';
    statusEl.textContent = `Fout: ${e.message}`;
    statusEl.className = 'save-status err';
    log(`✗ ${product.name}: ${e.message}`, 'err');
  }

  btn.disabled = false;
  btn.textContent = '💾 OPSLAAN';
}

async function generateAll() {
  const btn = document.getElementById('generateAllBtn');
  btn.disabled = true;

  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  bar.classList.add('visible');

  for (let i = 0; i < products.length; i++) {
    const p = products[i];
    // Open card to show progress
    const body = document.getElementById(`body-${p.sku}`);
    if (!body.classList.contains('open')) toggleCard(p.sku);
    await generateOne(p.sku);
    await new Promise(r => setTimeout(r, 300));
    fill.style.width = `${((i+1)/products.length)*100}%`;
  }

  btn.disabled = false;
  btn.textContent = '✓ ALLE GEGENEREERD';
  log(`Alle ${products.length} meta teksten gegenereerd`, 'ok');
}

async function saveAll() {
  const btn = document.getElementById('saveAllBtn');
  btn.disabled = true;
  btn.textContent = '⏳ ALLES OPSLAAN...';

  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  bar.classList.add('visible');
  fill.style.width = '0%';

  let saved = 0;
  for (let i = 0; i < products.length; i++) {
    await saveOne(products[i].sku);
    await new Promise(r => setTimeout(r, 200));
    fill.style.width = `${((i+1)/products.length)*100}%`;
    saved++;
  }

  btn.disabled = false;
  btn.textContent = `✓ ${saved} OPGESLAGEN`;
  log(`${saved} producten opgeslagen in Magento`, 'ok');
}
</script>
</body>
</html>
